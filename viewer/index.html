<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading — A Field Guide to the Majjhima Nikaya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<style>

:root{
  --bg-deep:      #140e0e;
  --bg-raised:    #1c1212;
  --gold:         #c9a84c;
  --gold-bright:  #e8d5a3;
  --gold-dim:     #8a7340;
  --text:         #f0e6d8;
  --text-soft:    #c4b8a8;
  --text-muted:   #8a7e72;
}

*{ margin:0; padding:0; box-sizing:border-box; }

html, body{
  height: 100%;
  font-family: 'EB Garamond', serif;
  background: var(--bg-deep);
  color: var(--text);
}

body{
  display: flex;
  flex-direction: column;
}

/* -- Header -- */
header{
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  padding: 16px 28px;
  background: linear-gradient(180deg, #1c1212 0%, #180f0f 100%);
  border-bottom: 1px solid rgba(201,168,76,0.15);
  box-shadow: 0 6px 24px rgba(0,0,0,0.4);
  z-index: 10;
}

.header-left{
  display: flex;
  align-items: center;
  gap: 16px;
  min-width: 0;
}

.back-link{
  display: inline-flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 999px;
  padding: 8px 18px;
  white-space: nowrap;
  transition: all 0.3s ease;
  flex-shrink: 0;
}

.back-link:hover{
  background: rgba(201,168,76,0.1);
  border-color: var(--gold);
}

.title-block{
  min-width: 0;
  overflow: hidden;
}

.title-block .eyebrow{
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 2px;
}

.title-block h1{
  font-size: 1.15rem;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.header-right{
  flex-shrink: 0;
}

.download-link{
  display: inline-flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--text-soft);
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 999px;
  padding: 8px 18px;
  transition: all 0.3s ease;
}

.download-link:hover{
  color: var(--gold-bright);
  border-color: rgba(201,168,76,0.4);
}

/* -- Viewer -- */
.viewer-wrap{
  flex: 1;
  position: relative;
  background: #0d0808;
}

.viewer-wrap iframe{
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* -- States -- */
.state-message{
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
  gap: 18px;
}

.state-message.hidden{ display: none; }

.state-ornament{
  font-size: 1.4rem;
  color: var(--gold-dim);
}

.state-message p{
  color: var(--text-soft);
  max-width: 480px;
  line-height: 1.8;
  font-size: 1.05rem;
}

.state-message .fallback-open{
  margin-top: 10px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 999px;
  padding: 12px 28px;
  transition: all 0.3s ease;
}

.state-message .fallback-open:hover{
  background: rgba(201,168,76,0.1);
  border-color: var(--gold);
}

</style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="../index.html" class="back-link">&larr; Library</a>
    <div class="title-block">
      <div class="eyebrow">Volume I &middot; Mulapariyaya Vagga</div>
      <h1 id="pageTitle">MN 1&ndash;10 &middot; The Division on the Root</h1>
    </div>
  </div>
  <div class="header-right">
    <a id="downloadLink" href="#" class="download-link" download>&#8681; Download PDF</a>
  </div>
</header>

<div class="viewer-wrap">
  <iframe id="pdfFrame" title="PDF reader"></iframe>

  <div class="state-message hidden" id="notFoundState">
    <div class="state-ornament">&#10087;</div>
    <p>This section isn't wired up yet — only MN 1&ndash;10 is hosted here for now. The rest will open directly from Google Drive until they're added.</p>
    <a href="../index.html" class="fallback-open">&larr; Return to the Library</a>
  </div>
</div>

<script>
// Map of "file" query values to their actual paths in the repo.
// Add an entry here each time a new PDF is hosted locally.
// NOTE: the current file has a literal space in its name — encoded below as %20.
const FILES = {
  "1.1": {
    path: "../1.1%20FGMN.pdf",
    title: "MN 1\u201310 \u00b7 The Division on the Root"
  }
};

const params = new URLSearchParams(window.location.search);
const key = params.get("file");
const entry = key ? FILES[key] : null;

const frame = document.getElementById("pdfFrame");
const notFound = document.getElementById("notFoundState");
const downloadLink = document.getElementById("downloadLink");
const pageTitle = document.getElementById("pageTitle");

if (entry) {
  frame.src = entry.path;
  downloadLink.href = entry.path;
  if (entry.title) pageTitle.textContent = entry.title;
} else {
  frame.style.display = "none";
  notFound.classList.remove("hidden");
  downloadLink.style.display = "none";
}
</script>

</body>
</html>
