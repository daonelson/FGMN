<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PDF Reader</title>

    <style>
        body {
            margin: 0;
            background: #333;
        }

        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>

</head>

<body>

<iframe id="pdfViewer"></iframe>

<script>

const pdf = new URLSearchParams(window.location.search).get("file");

document.getElementById("pdfViewer").src =
    "https://mozilla.github.io/pdf.js/web/viewer.html?file=" 
    + encodeURIComponent(pdf);

</script>

</body>

</html>
