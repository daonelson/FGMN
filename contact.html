<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{

--bg:#f5efe2;
--text:#3b3026;
--gold:#9b7b38;

}

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

background:var(--bg);
color:var(--text);
font-family:'EB Garamond',serif;
line-height:1.8;

}

.container{

max-width:700px;
margin:auto;
padding:70px 28px 90px;

}

.wheel{

display:block;
width:110px;
margin:0 auto 30px;

}

.site-title{

text-align:center;
font-size:1.45rem;
letter-spacing:.08em;
font-weight:500;
margin-bottom:50px;

}

.divider{

width:260px;
height:1px;
background:var(--gold);
margin:0 auto 55px;

}

h1{

text-align:center;
font-size:2.8rem;
font-weight:500;
margin-bottom:55px;

}

form{

max-width:560px;
margin:auto;

}

label{

display:block;
font-size:1.15rem;
margin-bottom:8px;

}

input,
textarea{

width:100%;
padding:14px;
margin-bottom:28px;
border:1px solid #d8ccb7;
background:#fbf8f1;
color:var(--text);
font-family:'EB Garamond',serif;
font-size:1.1rem;

}

textarea{

min-height:180px;
resize:vertical;

}

button{

display:block;
margin:10px auto 0;
padding:12px 36px;
border:1px solid var(--gold);
background:none;
color:var(--text);
font-family:'EB Garamond',serif;
font-size:1.15rem;
cursor:pointer;
transition:.25s;

}

button:hover{

background:var(--gold);
color:white;

}

.return{

text-align:center;
margin-top:70px;
font-size:1.15rem;

}

.return a{

color:var(--gold);
text-decoration:none;

}

.return a:hover{

text-decoration:underline;

}

@media(max-width:700px){

.container{

padding:50px 22px 70px;

}

h1{

font-size:2.25rem;

}

}

</style>

</head>

<body>

<div class="container">

<img
class="wheel"
src="dhammawheel.png"
alt="Dhamma Wheel">

<div class="site-title">

A Field Guide to the Majjhima Nikāya

</div>

<div class="divider"></div>

<h1>

Contact

</h1>
<form
action="https://formspree.io/f/mwvgnogq"
method="POST">

<label for="name">

Name

</label>

<input
type="text"
id="name"
name="name"
required>


<label for="email">

Email

</label>

<input
type="email"
id="email"
name="email"
required>


<label for="message">

Message

</label>

<textarea
id="message"
name="message"
required></textarea>


<button type="submit">

Send

</button>

</form>
<div class="divider"></div>

<div class="return">

<a href="index.html">

← Return

</a>

</div>

</div>

</body>

</html>
