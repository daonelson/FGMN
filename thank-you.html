<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{

--bg:#f5efe2;
--text:#3b3026;
--gold:#9b7b38;

}

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

background:var(--bg);
color:var(--text);
font-family:'EB Garamond',serif;
line-height:1.8;

}

.container{

max-width:700px;
margin:auto;
padding:70px 28px 90px;

}

.wheel{

display:block;
width:110px;
margin:0 auto 30px;

}

.site-title{

text-align:center;
font-size:1.45rem;
letter-spacing:.08em;
font-weight:500;
margin-bottom:50px;

}

.divider{

width:260px;
height:1px;
background:var(--gold);
margin:0 auto 55px;

}

h1{

text-align:center;
font-size:2.8rem;
font-weight:500;
margin-bottom:30px;

}

.message{

text-align:center;
font-size:1.35rem;
max-width:560px;
margin:0 auto 55px;

}

.return{

text-align:center;
font-size:1.15rem;

}

.return a{

color:var(--gold);
text-decoration:none;

}

.return a:hover{

text-decoration:underline;

}

@media(max-width:700px){

.container{

padding:50px 22px 70px;

}

h1{

font-size:2.25rem;

}

.message{

font-size:1.2rem;

}

}

</style>

</head>

<body>

<div class="container">

<img
class="wheel"
src="dhammawheel.png"
alt="Dhamma Wheel">

<div class="site-title">

A Field Guide to the Majjhima Nikāya

</div>

<div class="divider"></div>

<h1>

Thank you.

</h1>

<div class="message">

Your message has been sent successfully.

</div>
<div class="divider"></div>

<div class="return">

<a href="index.html">

← Return to Home

</a>

</div>

</div>

</body>

</html>
